name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi
          # Check if any non-doc files changed
          CODE_FILES=$(echo "$FILES" | grep -vE '(\.md$|\.txt$|^LICENSE$)' | grep -v '^$' || true)
          if [ -n "$CODE_FILES" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check Java formatting
        run: mvn spotless:check --batch-mode --no-transfer-progress

      - name: Build and test SafeRE, crosscheck, and exhaustive modules
        run: >
          mvn verify -pl safere,safere-crosscheck,safere-exhaustive -am
          -Pcrosscheck-public-api-tests
          -Dtest.parallelism=4
          --batch-mode --no-transfer-progress

  benchmark-smoke-test-java:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Smoke test Java benchmarks
        run: ./run-java-benchmarks.sh --smoke RegexBenchmark

      - name: Smoke test Java memory benchmarks (GC profiler)
        run: ./run-java-memory-benchmarks.sh --smoke RegexBenchmark

      - name: Smoke test Java memory benchmarks (pattern sizes)
        run: |
          java -Xms256m -Xmx256m -cp safere-benchmarks/target/benchmarks.jar \
            org.safere.benchmark.MemoryBenchmark

  benchmark-smoke-test-cpp:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compile C++ RE2 benchmarks
        run: |
          mkdir -p safere-benchmarks/cpp/build
          cmake -S safere-benchmarks/cpp -B safere-benchmarks/cpp/build \
            -DCMAKE_BUILD_TYPE=Release -Wno-dev
          cmake --build safere-benchmarks/cpp/build -j$(nproc)

      - name: Smoke test C++ RE2 benchmarks
        run: |
          safere-benchmarks/cpp/build/re2_benchmark \
            --data safere-benchmarks/benchmark-data.json literalMatch

      - name: Smoke test C++ RE2 memory benchmarks
        run: |
          safere-benchmarks/cpp/build/re2_benchmark \
            --data safere-benchmarks/benchmark-data.json MemoryBenchmark

  benchmark-smoke-test-go:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache: false

      - name: Compile Go benchmarks
        run: cd safere-benchmarks/go && go build -o regexp_benchmark .

      - name: Smoke test Go benchmarks
        run: |
          safere-benchmarks/go/regexp_benchmark \
            --data safere-benchmarks/benchmark-data.json literalMatch

      - name: Smoke test Go memory benchmarks
        run: |
          safere-benchmarks/go/regexp_benchmark \
            --data safere-benchmarks/benchmark-data.json MemoryBenchmark
